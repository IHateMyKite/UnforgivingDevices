<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>UnforgivingDevices</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body id="main">
        <div id="mg_minigame">
            <div style="left:0%;" class="mg_minigamezone mg_minigamezone_left"></div>
            <div style="right:0%;" class="mg_minigamezone mg_minigamezone_right"></div>
            <div id="mg_cursor"></div>
        </div>
        
        <div id="mg_stats">
            <div id="mg_durability_border" class="mg_bar">
                <div id="mg_durability" class="mg_bar"></div>
            </div>
            <div id="mg_condition_border" class="mg_bar">
                <div id="mg_condition" class="mg_bar"></div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
